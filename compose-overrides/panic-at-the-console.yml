# The student stack exposes development ports for every service. On the Pi, Caddy
# is the only public entry point, so bind only the edge proxy to loopback.
services:
  postgres:
    ports: !override []
  nats:
    ports: !override []
  ollama:
    ports: !override []
  frontend:
    ports: !override []
  gateway:
    healthcheck:
      start_period: 5m
  incident-service:
    ports: !override []
    healthcheck:
      start_period: 5m
  event-service:
    ports: !override []
    healthcheck:
      start_period: 5m
  user-service:
    ports: !override []
    healthcheck:
      start_period: 5m
  notification-service:
    ports: !override []
    healthcheck:
      start_period: 5m
  webhook-service:
    ports: !override []
    healthcheck:
      start_period: 5m
  genai-service:
    ports: !override []
  prometheus:
    ports: !override []
  grafana:
    ports: !override []
  edge:
    ports: !override
      - "127.0.0.1:18080:8080"
