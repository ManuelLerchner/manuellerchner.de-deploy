apps:
  # ---------------------------------------------------------------------------
  # Static sites — Caddy serves output dir directly, no Node process needed
  # ---------------------------------------------------------------------------

  - name: Website
    repo: https://github.com/ManuelLerchner/manuellerchner.de.git
    build: null # pure static, no build step
    type: static
    output: public
    domain: manuellerchner.de
    deploy_path: /srv/apps/Website
    spa: false

  - name: Pathfinder
    repo: https://github.com/ManuelLerchner/Pathfinder-Website.git
    build: npm install && npm run build
    type: static
    output: build
    domain: pathfinder.manuellerchner.de
    deploy_path: /srv/apps/Pathfinder
    spa: true

  - name: LambdaCalculus
    repo: https://github.com/ManuelLerchner/Lambda-Calculus-Website.git
    build: null # pure HTML, no build step
    type: static
    output: .
    domain: lambdacalculus.manuellerchner.de
    deploy_path: /srv/apps/LambdaCalculus
    spa: false

  - name: Monopoly
    repo: https://github.com/ManuelLerchner/Monopoly-Smart-Bank.git
    build: npm install && npm run build
    type: static
    output: build
    domain: monopoly.manuellerchner.de
    deploy_path: /srv/apps/Monopoly
    spa: true
    env_file: .env
    env_note: Present in the app repo (build-time); override locally if needed.

  - name: MinecraftBot
    repo: https://github.com/ManuelLerchner/Minecraft-Bot-Website.git
    build: npm install && npm run build
    type: static
    output: dist/Minecraft-Bot
    domain: minecraft-bot.manuellerchner.de
    deploy_path: /srv/apps/MinecraftBot
    spa: false

  - name: TaskPlanner
    repo: https://github.com/ManuelLerchner/Task-Planner.git
    build: npm install && npm run build
    type: static
    output: dist/Task-Planner
    domain: taskplanner.manuellerchner.de
    deploy_path: /srv/apps/TaskPlanner
    spa: false

  - name: MockTrading
    repo: https://github.com/ManuelLerchner/Mock-Trading.git
    build: npm install && npm run build
    type: static
    output: dist/Mock-Trading
    domain: mocktrading.manuellerchner.de
    deploy_path: /srv/apps/MockTrading
    spa: true

  - name: ExpenseTracker
    repo: https://github.com/ManuelLerchner/Expense-Tracker.git
    build: npm install && npm run build
    type: static
    output: dist/Expense-Tracker
    domain: expensetracker.manuellerchner.de
    deploy_path: /srv/apps/ExpenseTracker
    spa: true

  - name: TilePlanner
    repo: https://github.com/ManuelLerchner/tile-planner.git
    build: npm install && npm run build
    type: static
    output: build
    domain: tile-planner.manuellerchner.de
    deploy_path: /srv/apps/TilePlanner
    spa: true
    env_file: .env
    env_note: Present in the app repo (build-time); override locally if needed.

  - name: AlgoExplorer
    repo: https://github.com/ManuelLerchner/algorithm-explorer.git
    build: npm install && npm run build
    type: static
    output: build
    domain: algoexplorer.manuellerchner.de
    deploy_path: /srv/apps/AlgoExplorer
    spa: true

  # ---------------------------------------------------------------------------
  # Node services — PM2 manages the process, Caddy reverse-proxies
  # ---------------------------------------------------------------------------

  - name: PiController
    repo: https://github.com/ManuelLerchner/Pi-Controller-Website.git
    build: npm install
    type: service
    entry: app.js
    port: 3000
    domain: pi.manuellerchner.de
    deploy_path: /srv/apps/PiController
    pm2_name: PiController
    env_file: config/config.env
    env_note: Manual on the Pi — not in git. Create from app docs / prior machine.
    post_deploy_cmd: >-
      [ -f config/config.env ] || cp /home/pi/Manuel-Lerchner-Website/config/config.env config/config.env

  - name: Backend
    repo: https://github.com/ManuelLerchner/Manuel-Lerchner-Backend-Server.git
    build: npm ci
    type: service
    entry: app.js
    port: 4000
    domain: api.manuellerchner.de
    deploy_path: /srv/apps/Backend
    pm2_name: Backend
    env_file: dotenv/.env
    env_note: Manual on the Pi — copy from dotenv/.env.example and fill secrets.
    post_deploy_cmd: >-
      [ -f dotenv/.env ] || cp dotenv/.env.example dotenv/.env

  - name: RestaurantApp
    repo: https://github.com/ManuelLerchner/RestaurantApp.git
    build: ./gradlew bootJar --no-daemon
    type: service
    # Spring Boot JAR — not a Node app, PM2 runs it via java
    start_cmd: java -jar build/libs/EIST22t02-Four0Four-1.0.0.jar
    port: 3019
    domain: restaurantapp.manuellerchner.de
    deploy_path: /srv/apps/RestaurantApp
    pm2_name: RestaurantApp
    # H2 file path must match application.properties: spring.datasource.url=jdbc:h2:./src/main/resources/restaurantDatabase.h2
    data_file: src/main/resources/restaurantDatabase.h2.mv.db
    data_note: >-
      H2 stores data under src/main/resources/ (see jdbc URL in application.properties), not the repo root.
      Copy from ~/RestaurantApp/restaurantDatabase.h2.mv.db if missing or stale after deploy.
    post_deploy_cmd: >-
      mkdir -p src/main/resources &&
      B=/home/pi/RestaurantApp/restaurantDatabase.h2.mv.db &&
      T=src/main/resources/restaurantDatabase.h2.mv.db &&
      [ -f "$B" ] && { [ ! -f "$T" ] || [ "$(stat -c%s "$B")" -gt "$(stat -c%s "$T")" ]; } && cp "$B" "$T"

  # ---------------------------------------------------------------------------
  # Background services — PM2 only, no Caddy entry
  # ---------------------------------------------------------------------------

  - name: DYNDNS
    repo: https://github.com/ManuelLerchner/DeinServerHost-DynDNS-Handler.git
    build: npm ci
    type: service
    entry: app.js
    port: null # no web-facing port
    domain: null
    deploy_path: /srv/apps/DYNDNS
    pm2_name: DYNDNS
    env_file: config/.env
    env_note: Manual on the Pi — not in git.
    post_deploy_cmd: >-
      [ -f config/.env ] || cp /home/pi/DeinServerHost-DynDNS-Handler/config/.env config/.env

# ---------------------------------------------------------------------------
# Redirects — Caddy only, no app managed here
# ---------------------------------------------------------------------------
redirects:
  - from: www.manuellerchner.de
    to: "https://{labels.1}.{labels.0}{uri}"

# ---------------------------------------------------------------------------
# Passthroughs — external services proxied by Caddy, not managed here
# ---------------------------------------------------------------------------
passthrough:
  - name: n8n
    domain: n8n.manuellerchner.de
    proxy: http://localhost:5678
