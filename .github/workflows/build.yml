name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # ── Lint + regenerate generated files ────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt --quiet

      - name: Lint apps.yaml
        run: python3 scripts/lint.py

      - name: Regenerate Caddyfile
        run: python3 scripts/gen_caddyfile.py

      - name: Regenerate README
        run: python3 scripts/gen_readme.py

      - name: Commit generated files (if changed)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Caddyfile README.md
          git diff --cached --quiet || git commit -m "chore: regenerate Caddyfile and README [skip ci]"
          git push

  # ── Test repo scripts ────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt --quiet

      - name: Run tests
        run: pytest -q

  # ── Generate build matrix from apps.yaml ─────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.json }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt --quiet

      - name: Generate matrix
        id: matrix
        run: |
          python3 - <<'EOF'
          import json, os, yaml

          with open("apps.yaml") as f:
              apps = yaml.safe_load(f)["apps"]

          def to_gh_repo(url: str) -> str:
              return url.removeprefix("https://github.com/").removesuffix(".git")

          matrix = [
              {
                  "name":         a["name"],
                  "repo":         to_gh_repo(a["repo"]),
                  "build":        a["build"],
                  "toolchain":    "java" if "gradlew" in a["build"] else "node",
                  "node_version": "20",
                  "java_version": "17",
              }
              for a in apps
              if a.get("build") and a["build"] not in (None, "null")
          ]

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"json={json.dumps(matrix)}\n")
          EOF

  # ── Build each app in parallel ────────────────────────────────────────────────
  build:
    needs: setup
    name: ${{ matrix.app.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # keep building other apps even if one fails
      matrix:
        app: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout ${{ matrix.app.name }}
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.app.repo }}

      # ── Node toolchain ────────────────────────────────────────────────────────
      - name: Setup Node ${{ matrix.app.node_version }}
        if: matrix.app.toolchain == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.app.node_version }}
          cache: npm

      # ── Java toolchain ────────────────────────────────────────────────────────
      - name: Setup Java ${{ matrix.app.java_version }}
        if: matrix.app.toolchain == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.app.java_version }}
          distribution: temurin

      - name: Cache Gradle
        if: matrix.app.toolchain == 'java'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ matrix.app.name }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ matrix.app.name }}-

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build
        run: ${{ matrix.app.build }}
        env:
          CI: "false"   # react-scripts treats warnings as errors when CI=true
