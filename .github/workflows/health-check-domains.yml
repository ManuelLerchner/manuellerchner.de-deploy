name: Health Check Domains

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  domain-health-check:
    runs-on: ubuntu-latest
    # secrets.DOMAIN_HEALTH_CHECK_SECRET → env DOMAIN_HEALTH_CHECK_SECRET for all steps.
    # Sends x-domain-health-check header and ?health_check_token=… (both trimmed); WAF should OR-match either.
    env:
      DOMAIN_HEALTH_CHECK_SECRET: ${{ secrets.DOMAIN_HEALTH_CHECK_SECRET }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Check secret is present (Cloudflare bypass)
        run: |
          if [ -z "${DOMAIN_HEALTH_CHECK_SECRET:-}" ]; then
            echo "::error::DOMAIN_HEALTH_CHECK_SECRET is unset. GitHub Actions IPs are often blocked by Cloudflare; add the secret under Repository → Settings → Secrets and variables → Actions (same value as in your WAF rule expression)."
            exit 1
          fi
          echo "DOMAIN_HEALTH_CHECK_SECRET is set (length ${#DOMAIN_HEALTH_CHECK_SECRET} characters)"

      - name: Build domain list from apps.yaml
        run: |
          python3 - <<'PY'
          import yaml

          with open("apps.yaml", "r", encoding="utf-8") as f:
              config = yaml.safe_load(f) or {}

          domains = []

          for app in config.get("apps", []):
              domain = app.get("domain")
              if domain:
                  domains.append(domain.strip())

          for redirect in config.get("redirects", []):
              domain = redirect.get("from")
              if domain:
                  domains.append(domain.strip())

          for passthrough in config.get("passthrough", []):
              # Internal TLS passthrough entries are not publicly reachable
              # with a trusted certificate from GitHub-hosted runners.
              if passthrough.get("tls") == "internal":
                  continue
              domain = passthrough.get("domain")
              if domain:
                  domains.append(domain.strip())

          unique_domains = sorted(set(d for d in domains if d))
          with open("domains.txt", "w", encoding="utf-8") as f:
              f.write("\n".join(unique_domains) + "\n")
          print(f"Checking {len(unique_domains)} domains")
          PY

      # Requires final HTTP status 2xx after redirects (so 403/502/503 fail).
      # continue-on-error allows TLS expiry step to run even when HTTP fails.
      - name: Check HTTPS returns 2xx on /
        id: http_check
        continue-on-error: true
        run: |
          failed=0
          # Strip leading/trailing whitespace (GitHub secret paste often adds a trailing newline → WAF eq mismatch).
          DH="$(printf '%s' "$DOMAIN_HEALTH_CHECK_SECRET" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ "${#DOMAIN_HEALTH_CHECK_SECRET}" -ne "${#DH}" ]; then
            echo "::warning::Secret had extra whitespace — trimmed for curl. Use the same trimmed hex in Cloudflare \`eq \"…\"\` or re-save the repo secret as one line."
          fi

          while IFS= read -r domain; do
            [ -z "$domain" ] && continue
            base="https://${domain}/"
            # Do not log full URL (would expose token). --data-urlencode is safe for non-hex secrets too.
            echo "Checking ${base} (header x-domain-health-check + query health_check_token)"

            code="$(curl --silent --show-error --location --max-time 25 \
              -G "$base" \
              --data-urlencode "health_check_token=${DH}" \
              -H "x-domain-health-check: ${DH}" \
              -o /dev/null -w "%{http_code}")"

            if [ "$code" = "000" ]; then
              echo "::error title=Domain unreachable::${base} is not reachable (transport/DNS/TLS error)"
              failed=1
            elif [[ "$code" =~ ^2[0-9]{2}$ ]]; then
              echo "${base} → HTTP $code OK"
            else
              hint=""
              if [ "$code" = "403" ] || [ "$code" = "401" ]; then
                hint=" (Cloudflare: Skip rule must match header or \`health_check_token\` query — same secret as \`DOMAIN_HEALTH_CHECK_SECRET\` — see README)"
              fi
              echo "::error title=Unexpected HTTP status::${base} returned HTTP $code (expected 2xx after redirects)$hint"
              failed=1
            fi
          done < domains.txt

          exit "$failed"

      - name: Check TLS certificate expiry
        id: tls_check
        if: always()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import socket
          import ssl
          import sys
          from datetime import datetime, timezone

          min_days = 14
          failed = False

          with open("domains.txt", "r", encoding="utf-8") as f:
              domains = [d.strip() for d in f if d.strip()]

          for domain in domains:
              context = ssl.create_default_context()
              try:
                  with socket.create_connection((domain, 443), timeout=10) as sock:
                      with context.wrap_socket(sock, server_hostname=domain) as ssock:
                          cert = ssock.getpeercert()
                  not_after_raw = cert.get("notAfter")
                  if not not_after_raw:
                      print(f"::error title=TLS cert missing::{domain} has no notAfter in certificate")
                      failed = True
                      continue
                  expires_at = datetime.strptime(not_after_raw, "%b %d %H:%M:%S %Y %Z").replace(tzinfo=timezone.utc)
                  days_left = (expires_at - datetime.now(timezone.utc)).days
                  print(f"{domain}: certificate expires in {days_left} days")
                  if days_left < min_days:
                      print(
                          f"::error title=TLS certificate expiring soon::{domain} expires in {days_left} days (< {min_days})"
                      )
                      failed = True
              except Exception as exc:
                  print(f"::error title=TLS check failed::{domain}: {exc}")
                  failed = True

          if failed:
              sys.exit(1)
          PY

      - name: Report overall status
        if: always()
        run: |
          failed=0
          if [ "${{ steps.http_check.outcome }}" != "success" ]; then
            echo "::error::HTTPS 2xx check failed. Set DOMAIN_HEALTH_CHECK_SECRET and a WAF Skip rule matching header x-domain-health-check and/or query health_check_token."
            failed=1
          fi
          if [ "${{ steps.tls_check.outcome }}" != "success" ]; then
            echo "::error::TLS certificate check failed"
            failed=1
          fi
          exit "$failed"
